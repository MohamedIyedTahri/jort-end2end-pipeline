services:
  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://host.docker.internal:9200
      SERVER_NAME: jort-kibana
      SERVER_HOST: 0.0.0.0
      XPACK_SECURITY_ENABLED: "false"
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: "jort-jort-jort-jort-jort-jort-jort-jort"
      XPACK_REPORTING_ENCRYPTIONKEY: "jort-jort-jort-jort-jort-jort-jort-jort-2"
      XPACK_SECURITY_ENCRYPTIONKEY: "jort-jort-jort-jort-jort-jort-jort-jort-3"
    extra_hosts:
      - "host.docker.internal:host-gateway"